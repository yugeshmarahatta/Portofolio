      if (theme === "light") {

      } else if (theme === "dark") {
        document.documentElement.classList.remove("light");

    /* ---- In-page blog reader (replaces Blogspot redirect) ---- */
    .blog-card {
      position: relative;
      display: flex;
      flex-direction: column;
      padding-top: 0.5rem;
    }

    .blog-card-view {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(120, 120, 140, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      flex-shrink: 0;
    }

    .blog-card-view svg {
      width: 18px;
      height: 18px;
      stroke: #6366f1;
      opacity: 0.9;
    }

    html.light .blog-card-view {
      background: rgba(99, 102, 241, 0.10);
    }

    html.light .blog-card-view svg {
      stroke: #4f46e5;
    }

    html:not(.light) .blog-card-view {
      background: rgba(165, 180, 252, 0.16);
    }

    html:not(.light) .blog-card-view svg {
      stroke: #a5b4fc;
    }

    .blog-card-view:hover {
      background: rgba(99, 102, 241, 0.28);
      transform: scale(1.06);
    }

    .blog-card-view:hover svg {
      opacity: 1;
    }

    .blog-card-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.9rem;
      flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
    }

    .blog-card-icon svg {
      width: 26px;
      height: 26px;
      stroke: #fff;
    }

    .icon-rag        { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .icon-edge       { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
    .icon-containers { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .icon-gears      { background: linear-gradient(135deg, #10b981, #059669); }
    .icon-compare    { background: linear-gradient(135deg, #ec4899, #f43f5e); }
    .icon-rocket     { background: linear-gradient(135deg, #8b5cf6, #6366f1); }
    .icon-code       { background: linear-gradient(135deg, #4f46e5, #2563eb); }
    .icon-mobile     { background: linear-gradient(135deg, #14b8a6, #0d9488); }
    .icon-target     { background: linear-gradient(135deg, #f97316, #dc2626); }
    .icon-layers     { background: linear-gradient(135deg, #a855f7, #7c3aed); }

    .blog-card-desc {
      margin-bottom: 0;
    }

    .blog-grid-status {
      grid-column: 1 / -1;
      text-align: center;
      opacity: 0.6;
      padding: 2rem 0;
    }

    #blogModalOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 5vh 1rem;
    }

    #blogModalOverlay.open {
      display: flex;
    }

    .blog-modal {
      background: var(--bg-elevated, #fff);
      color: var(--text-primary, #111);
      max-width: 720px;
      width: 100%;
      margin: auto;
      border-radius: 14px;
      padding: 2.5rem;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: left;
    }

    html:not(.light) .blog-modal {
      background: #16181d;
      color: #eee;
    }

    .blog-modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: none;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      color: inherit;
      opacity: 0.7;
    }

    .blog-modal-close:hover {
      opacity: 1;
    }

    .blog-modal-icon {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }

    .blog-modal-icon svg {
      width: 30px;
      height: 30px;
      stroke: #fff;
    }

    .blog-modal-date {
      display: block;
      text-align: center;
      font-size: 0.85rem;
      opacity: 0.65;
      margin-bottom: 0.5rem;
    }

    .blog-modal-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 1.5rem;
      text-align: center;
    }

    .blog-modal-body {
      font-size: 1rem;
      line-height: 1.75;
      max-width: 620px;

    }

    .blog-modal-body h3 {

    .blog-modal-body ul,

    }

    .blog-modal-body li {
      margin-bottom: 0.45rem;
    }

    .blog-modal-body strong {
      font-weight: 600;
    }
  </style>

  <script src="assets/js/main.js"></script>

  <script>
    // ---- Reader logic (no Blogspot redirect) ----
    // The "eye" glyph used on every card's view button is the only icon that
    // isn't data-driven, since it's a UI affordance rather than post content.
    const VIEW_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

    // All blog content — including each post's icon SVG markup — lives in
    // blogs.json. Fetched once, then both the grid and the modal are built
    // by mapping/looping over that array, rather than hardcoding per-post markup.
    let BLOG_POSTS = [];

    (function () {
      const grid = document.getElementById("blogGrid");
      const gridStatus = document.getElementById("blogGridStatus");
      const overlay = document.getElementById("blogModalOverlay");
      const closeBtn = document.getElementById("blogModalClose");
      const modalIcon = document.getElementById("blogModalIcon");
      const modalDate = document.getElementById("blogModalDate");
      const modalTitle = document.getElementById("blogModalTitle");
      const modalBody = document.getElementById("blogModalBody");

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // Build one <article class="blog-card"> per post from the JSON data.
      function cardTemplate(post) {
        return (
          '<article class="blog-card">' +
            '<button type="button" class="blog-card-view" data-blog="' + escapeHtml(post.id) + '" aria-label="View article">' +
              VIEW_ICON +
            '</button>' +
            '<div class="blog-card-icon ' + escapeHtml(post.iconClass) + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + post.svg + '</svg>' +
            '</div>' +
            '<span class="blog-card-date">' + escapeHtml(post.date) + '</span>' +
            '<h3 class="blog-card-title">' + escapeHtml(post.title) + '</h3>' +
            '<p class="blog-card-desc">' + escapeHtml(post.desc) + '</p>' +
          '</article>'
        );
      }

      function renderGrid(posts) {
        grid.innerHTML = posts.map(cardTemplate).join("");
        wireCardButtons();
      }

      function openBlog(id) {
        const post = BLOG_POSTS.find(function (p) { return p.id === id; });
        if (!post) return;
        modalIcon.className = "blog-modal-icon " + post.iconClass;
        modalIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + post.svg + '</svg>';
        modalDate.textContent = post.date;
        modalTitle.textContent = post.title;
        modalBody.innerHTML = post.content;
        overlay.classList.add("open");
        document.body.style.overflow = "hidden";
        closeBtn.focus();
      }

      function closeBlog() {
        overlay.classList.remove("open");
        document.body.style.overflow = "";
      }

      function wireCardButtons() {
        document.querySelectorAll(".blog-card-view[data-blog]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            openBlog(btn.getAttribute("data-blog"));
          });
        });
      }

      closeBtn.addEventListener("click", closeBlog);
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) closeBlog();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && overlay.classList.contains("open")) closeBlog();
      });

      fetch("blogs.json")
        .then(function (res) {
          if (!res.ok) throw new Error("Failed to load blogs.json (" + res.status + ")");
          return res.json();
        })
        .then(function (posts) {
          BLOG_POSTS = posts;
          renderGrid(posts);
        })
        .catch(function (err) {
          console.error("Could not load blog content:", err);
          gridStatus.textContent = "Couldn't load articles right now. Please try again later.";
        });
    })();
  </script>
